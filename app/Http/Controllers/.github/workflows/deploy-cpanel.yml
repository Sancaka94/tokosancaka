name: 🚀 Auto Deploy ke cPanel

on:
  push:
    branches:
      - master  # Ganti dengan 'master' jika branch utama Anda bernama master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files to cPanel
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Ganti public_html jika folder proyek Anda di cPanel ada di subfolder
        # Contoh: public_html/tokosancaka
        server-dir: public_html/ 
        exclude: |
          **/.git*
          **/.github*
          **/node_modules/**
          .env