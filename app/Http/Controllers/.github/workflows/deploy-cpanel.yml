name: Auto Deploy to cPanel

on:
  push:
    branches:
      - master  # Sesuaikan nama branch (master/main)

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_KEY }}
          port: 2223  # PENTING: Ganti 22 dengan port SSH hostingmu jika beda (misal 65002)
          script: |
            # Masuk ke folder project
            cd ~/public_html
            
            # Tarik data terbaru dari GitHub
            # (Tenang, ini tidak akan menimpa .env server karena .env tidak ada di GitHub)
            git pull origin master
            
            # Bersihkan cache agar perubahan config/view langsung ngefek
            php artisan optimize:clear
            
            # Opsional: Jalankan migrasi database jika ada perubahan tabel
            # Hapus tanda pagar (#) di bawah jika ingin otomatis update database
            # php artisan migrate --force